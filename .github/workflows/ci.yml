name: CI

on:
  push:
    branches: [ main, dev, ci/cd ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.compiler.name }})
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC, cc: gcc, cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }

    env:
      BUILD_DIR: build-${{ matrix.compiler.cc }}
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          cmake --version
          "$CXX" --version

      - name: Configure
        run: cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Test
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure

  leak-check:
    name: Leak check (${{ matrix.compiler.name }})
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC, cc: gcc, cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }

    env:
      BUILD_DIR: build-asan-${{ matrix.compiler.cc }}
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
      SAN_FLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
      ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (sanitizers)
        run: >
          cmake -S . -B "$BUILD_DIR"
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="$SAN_FLAGS"
          -DCMAKE_CXX_FLAGS="$SAN_FLAGS"
          -DCMAKE_EXE_LINKER_FLAGS="$SAN_FLAGS"

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Test under sanitizers
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure

  coverage:
    name: Coverage (GCC)
    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: write

    env:
      BUILD_DIR: build-coverage
      CC: gcc
      CXX: g++
      COV_FLAGS: "--coverage -O0 -g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (coverage)
        run: >
          cmake -S . -B "$BUILD_DIR"
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="$COV_FLAGS"
          -DCMAKE_CXX_FLAGS="$COV_FLAGS"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Test
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure

      - name: Generate coverage report
        id: coverage
        run: |
          lcov --directory "$BUILD_DIR" --capture --output-file coverage.info \
               --rc geninfo_unexecuted_blocks=1 \
               --ignore-errors mismatch,gcov,inconsistent
          lcov --remove coverage.info \
               '/usr/*' '*/_deps/*' '*/tests/*' \
               --output-file coverage.info \
               --ignore-errors unused,inconsistent
          lcov --list coverage.info
          genhtml coverage.info --output-directory coverage-html \
               --ignore-errors inconsistent,source

          summary="$(lcov --summary coverage.info 2>&1)"
          lines="$(echo "$summary" | grep -oP 'lines\.+:\s*\K[0-9.]+%')"
          funcs="$(echo "$summary" | grep -oP 'functions\.+:\s*\K[0-9.]+%')"
          echo "lines=${lines:-n/a}"     >> "$GITHUB_OUTPUT"
          echo "functions=${funcs:-n/a}" >> "$GITHUB_OUTPUT"

      - name: Publish coverage to job summary
        if: always()
        run: |
          {
            echo "## ✅ Tests passed — Coverage report"
            echo ""
            echo '```'
            lcov --summary coverage.info 2>&1 | grep -E 'lines|functions'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const body = [
              marker,
              '## ✅ Tests passed',
              '',
              '| Metric | Coverage |',
              '| --- | --- |',
              `| Lines | ${{ steps.coverage.outputs.lines }} |`,
              `| Functions | ${{ steps.coverage.outputs.functions }} |`,
              '',
              `Full HTML report: download the **coverage-report** artifact from [this run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.info
            coverage-html
