name: CI

#good
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  web-lint:
    name: Web lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: |
          . .venv/bin/activate
          ruff check lbweb/
      - name: Mypy
        run: |
          . .venv/bin/activate
          mypy lbweb/

  test:
    name: Test (${{ matrix.config.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Release, cc: gcc, cxx: g++, build-type: Release }
          - { name: Debug+ASAN+UBSAN, cc: gcc, cxx: g++, build-type: Debug }
    env:
      BUILD_DIR: build-${{ matrix.config.name }}
      CC: ${{ matrix.config.cc }}
      CXX: ${{ matrix.config.cxx }}
      ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ cmake ccache libasan8 libubsan1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ matrix.config.name }}
          max-size: 200M

      - name: Configure
        run: |
          cmake -S . -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config.build-type }} \
            -DBUILD_TESTING=ON \
            -DENABLE_STRESS_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            ${{ matrix.config.san && '-DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"' || '' }} \
            ${{ matrix.config.san && '-DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"' || '' }} \
            ${{ matrix.config.san && '-DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"' || '' }}

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Test
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure